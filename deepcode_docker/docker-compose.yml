services:
  deepcode:
    build:
      context: ..
      dockerfile: deepcode_docker/Dockerfile
    container_name: deepcode
    ports:
      - "${DEEPCODE_BIND_ADDRESS:-127.0.0.1}:${DEEPCODE_HOST_PORT:-8000}:8000"
      # Codex/ChatGPT browser-login callback ports
      - "${DEEPCODE_BIND_ADDRESS:-127.0.0.1}:${CODEX_AUTH_CALLBACK_PORT:-1455}:${CODEX_AUTH_CALLBACK_PORT:-1455}"
      - "${DEEPCODE_BIND_ADDRESS:-127.0.0.1}:${CODEX_AUTH_FALLBACK_CALLBACK_PORT:-1457}:${CODEX_AUTH_FALLBACK_CALLBACK_PORT:-1457}"
    volumes:
      # Configuration (required) — writable by the Settings UI, but never auto-created
      - type: bind
        source: ../deepcode_config.json
        target: /app/deepcode_config.json
        bind:
          create_host_path: false

      # Persistent data
      - ../deepcode_lab:/app/deepcode_lab
      - ../uploads:/app/uploads
      - ../logs:/app/logs
      - codex-home:/root/.codex
    environment:
      - DEEPCODE_ENV=docker
      - DEEPCODE_PORT=8000
      - CODEX_HOME=/root/.codex
      - CODEX_AUTH_CALLBACK_BIND_HOST=0.0.0.0
      - CODEX_AUTH_CALLBACK_PORT=${CODEX_AUTH_CALLBACK_PORT:-1455}
      - CODEX_AUTH_FALLBACK_CALLBACK_PORT=${CODEX_AUTH_FALLBACK_CALLBACK_PORT:-1457}
    restart: unless-stopped

  nanobot:
    profiles: ["nanobot"]
    build:
      context: ..
      dockerfile: nanobot/Dockerfile
    container_name: nanobot
    ports:
      - "${DEEPCODE_BIND_ADDRESS:-127.0.0.1}:${NANOBOT_HOST_PORT:-18790}:18790"
    volumes:
      # nanobot configuration (飞书/Telegram token 等)
      - type: bind
        source: ../nanobot_config.json
        target: /root/.nanobot/config.json
        read_only: true
        bind:
          create_host_path: false

      # Persistent workspace data
      - nanobot-workspace:/root/.nanobot/workspace
      - nanobot-sessions:/root/.nanobot/sessions

      # Shared with DeepCode: nanobot can access generated code
      - ../deepcode_lab:/app/deepcode_lab
    environment:
      - NANOBOT_ENV=docker
      # Internal API URL for nanobot -> DeepCode communication
      - DEEPCODE_API_URL=http://deepcode:8000
    depends_on:
      - deepcode
    restart: unless-stopped

volumes:
  codex-home:
  nanobot-workspace:
  nanobot-sessions:
